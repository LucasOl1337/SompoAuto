services:
  - type: web
    name: sompoauto-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENCLAW_RUNTIME_MODE
        value: mock
      - key: AUTO_SEED_DEMO_ON_EMPTY
        value: "true"
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_PATH
        value: /opt/render/project/src/backend/.data/artifacts
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: sompoauto-db
          property: connectionString
    disk:
      name: sompoauto-artifacts
      mountPath: /opt/render/project/src/backend/.data
      sizeGB: 1

  - type: web
    name: sompoauto-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sompoauto-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sompoauto-db
