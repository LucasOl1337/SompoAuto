services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: sompo_proto
      POSTGRES_USER: sompo
      POSTGRES_PASSWORD: sompo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2026-02-15T17-29-25Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://sompo:sompo@postgres:5432/sompo_proto
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: sompo-artifacts
      MINIO_SECURE: "false"
      OPENCLAW_RUNTIME_MODE: ${OPENCLAW_RUNTIME_MODE:-mock}
      AUTO_SEED_DEMO_ON_EMPTY: ${AUTO_SEED_DEMO_ON_EMPTY:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - postgres
      - minio
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  minio_data:
